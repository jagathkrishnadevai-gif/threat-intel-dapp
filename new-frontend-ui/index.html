
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENTINEL_SYS | Decentralized Defense Mesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-lime: #DFFF00;
        --dark-bg: #000000;
        --grid-color: rgba(223, 255, 0, 0.03);
      }
      body {
        font-family: 'JetBrains Mono', monospace;
        background-color: var(--dark-bg);
        color: #ffffff;
        margin: 0;
        overflow-x: hidden;
      }
      .bg-grid {
        background-image: 
          linear-gradient(var(--grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 99;
        background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(223, 255, 0, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
        opacity: 0.1;
        position: fixed;
        bottom: 100%;
        animation: scanline 8s linear infinite;
        pointer-events: none;
      }
      @keyframes scanline {
        0% { bottom: 100%; }
        100% { bottom: -100px; }
      }
      .text-neon { color: var(--neon-lime); }
      .bg-neon { background-color: var(--neon-lime); }
      .border-neon { border-color: var(--neon-lime); }
      
      .glitch {
        position: relative;
        display: inline-block;
      }
      .glitch::before, .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch::before {
        left: 2px;
        text-shadow: -2px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch::after {
        left: -2px;
        text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
        animation: glitch-anim2 1s infinite linear alternate-reverse;
      }
      @keyframes glitch-anim {
        0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
        5% { clip: rect(70px, 9999px, 71px, 0); transform: skew(0.81deg); }
        10% { clip: rect(62px, 9999px, 83px, 0); transform: skew(0.51deg); }
        100% { clip: rect(13px, 9999px, 61px, 0); transform: skew(0.79deg); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.55deg); }
        23% { clip: rect(10px, 9999px, 50px, 0); transform: skew(0.31deg); }
        100% { clip: rect(81px, 9999px, 90px, 0); transform: skew(0.81deg); }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--neon-lime); }

      /* Terminal styles */
      .corner-tl { border-top: 2px solid var(--neon-lime); border-left: 2px solid var(--neon-lime); width: 10px; height: 10px; position: absolute; top: 0; left: 0; }
      .corner-tr { border-top: 2px solid var(--neon-lime); border-right: 2px solid var(--neon-lime); width: 10px; height: 10px; position: absolute; top: 0; right: 0; }
      .corner-bl { border-bottom: 2px solid var(--neon-lime); border-left: 2px solid var(--neon-lime); width: 10px; height: 10px; position: absolute; bottom: 0; left: 0; }
      .corner-br { border-bottom: 2px solid var(--neon-lime); border-right: 2px solid var(--neon-lime); width: 10px; height: 10px; position: absolute; bottom: 0; right: 0; }
    </style>

{

</head>

</html>
